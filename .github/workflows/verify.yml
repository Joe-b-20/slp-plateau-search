name: verify

on:
  push:
  pull_request:

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Verify the record circuits with the standalone oracle
        run: |
          python verify_circuit.py evidence/circuits/mixcolumns_97gates_depth3.json 3
          python verify_circuit.py evidence/circuits/mixcolumns_92gates_depth4.json 4
          python verify_circuit.py evidence/circuits/mixcolumns_89gates_depth5.json 5
      - name: Unit tests (core invariants)
        run: python -m unittest discover -s tests -v
      - name: Compile check
        run: python -m compileall -q reproduce pipeline verify_circuit.py
